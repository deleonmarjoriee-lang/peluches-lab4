<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Peluche</title>
</head>
<body>

<h2>Formulario Peluche</h2>

<form th:action="@{/peluches/guardar}"
      th:object="${peluche}"
      method="post">

    <input type="hidden" th:field="*{id}">

    Nombre:

    <input type="text"
           th:field="*{nombre}">

    <br><br>

    Precio:

    <input type="number"
           step="0.01"
           th:field="*{precio}">

    <br><br>

    Categoria:

    <select th:field="*{categoria}">

        <option th:each="c : ${categorias}"
                th:value="${c.id}"
                th:text="${c.nombre}">
        </option>

    </select>

    <br><br>

    <button type="submit">
        Guardar
    </button>

</form>

<br>

<a href="/peluches">
Volver
</a>

</body>
</html>
