<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Categorías</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.2);
    width:800px;
}

h2{
    text-align:center;
    color:#333;
}

.btn{
    background:#28a745;
    color:white;
    padding:10px 15px;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.btn:hover{
    background:#218838;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:#007BFF;
    color:white;
    padding:12px;
}

table td{
    text-align:center;
    padding:12px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f2f2f2;
}

.editar{
    background:#ffc107;
    color:black;
    padding:8px 12px;
    border-radius:6px;
    text-decoration:none;
    margin-right:5px;
}

.editar:hover{
    background:#e0a800;
}

.eliminar{
    background:#dc3545;
    color:white;
    padding:8px 12px;
    border-radius:6px;
    text-decoration:none;
}

.eliminar:hover{
    background:#c82333;
}

.contenedorInicio{
    text-align:center;
    margin-top:25px;
}

.inicio{
    display:inline-block;
    background:#6c757d;
    color:white;
    padding:10px 15px;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.inicio:hover{
    background:#545b62;
}

</style>

</head>
<body>

<div class="container">

    <h2>📂 Listado de Categorías</h2>

    <a href="/categorias/nuevo" class="btn">
        ➕ Nueva Categoría
    </a>

    <table>

        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Acciones</th>
        </tr>

        <tr th:each="c : ${categorias}">

            <td th:text="${c.id}"></td>

            <td th:text="${c.nombre}"></td>

            <td>

                <a class="editar"
                   th:href="@{/categorias/editar/{id}(id=${c.id})}">
                    ✏️ Editar
                </a>

                <a class="eliminar"
                   th:href="@{/categorias/eliminar/{id}(id=${c.id})}">
                    🗑️ Eliminar
                </a>

            </td>

        </tr>

    </table>

    <div class="contenedorInicio">

        <a href="/" class="inicio">
            🏠 Regresar al Inicio
        </a>

    </div>

</div>

</body>
</html>
